server:
  port: 8080

spring:
  application:
    name: ftcp
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ftcp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      schema: public
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgres.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: FTCP-Token
  timeout: 2592000
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: tik
  is-log: false

flowable:
  database-schema-update: true
  async-executor-activate: false
  database-schema: ftcp_flowable

logging:
  level:
    com.cqupt: debug
